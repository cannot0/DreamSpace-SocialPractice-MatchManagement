<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 — 返家乡实践活动推荐系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>

  <div class="auth-page">
    <!-- Left: Cinematic Visual -->
    <div class="auth-visual">
      <div class="auth-visual-bg" style="background-image: url('https://picsum.photos/seed/village-morning/1200/900')"></div>
      <div class="auth-visual-overlay"></div>
      <div class="auth-visual-content" id="visualContent">
        <h2>开启你的<br>实践之旅</h2>
        <p>注册一个账号，解锁 AI 驱动的个性化推荐。从企业实习到科研调研，从公益志愿到文化传播，总有一个方向适合你。</p>
      </div>
    </div>

    <!-- Right: Register Form -->
    <div class="auth-form-side" style="background-image: url('https://picsum.photos/seed/village-morning/1200/900'); background-size: cover; background-position: center;">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg, rgba(232,133,61,0.04) 0%, rgba(26,31,46,0.97) 25%, var(--color-bg) 60%);"></div>
      <div class="auth-card" id="authCard" style="position:relative;z-index:2;">
        <div class="auth-header">
          <span class="logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-primary)">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/>
              <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
          </span>
          <h1>创建新账号</h1>
          <p>注册后即可使用 AI 推荐功能</p>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form class="auth-form" method="POST" action="{{ url_for('register') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="3-50个字符，字母、数字、下划线"
                   value="{{ request.form.get('username', '') }}" required autofocus>
          </div>

          <div class="form-group">
            <label for="nickname">昵称</label>
            <input type="text" id="nickname" name="nickname" placeholder="显示给其他用户的名称"
                   value="{{ request.form.get('nickname', '') }}" required>
          </div>

          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="6-50个字符" required>
          </div>

          <div class="form-group">
            <label for="password_confirm">确认密码</label>
            <input type="password" id="password_confirm" name="password_confirm" placeholder="再次输入密码" required>
          </div>

          <button type="submit" class="auth-btn">注 册</button>
        </form>

        <div class="auth-footer">
          已有账号？<a href="{{ url_for('login') }}">立即登录</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

      tl.from('#visualContent h2', {
        y: 40, opacity: 0, duration: 0.9, delay: 0.2
      })
      .from('#visualContent p', {
        y: 30, opacity: 0, duration: 0.7
      }, '-=0.5')
      .from('#authCard', {
        x: 40, opacity: 0, duration: 0.8
      }, '-=0.6')
      .from('#authCard .form-group', {
        y: 20, opacity: 0, duration: 0.5, stagger: 0.1
      }, '-=0.4')
      .from('#authCard .auth-btn', {
        y: 16, opacity: 0, duration: 0.5
      }, '-=0.2')
      .from('#authCard .auth-footer', {
        opacity: 0, duration: 0.4
      }, '-=0.2');
    });
  </script>

</body>
</html>
