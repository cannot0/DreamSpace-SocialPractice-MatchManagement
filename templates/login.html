<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — 返家乡实践活动推荐系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>

  <div class="auth-page">
    <!-- Left: Cinematic Visual -->
    <div class="auth-visual">
      <div class="auth-visual-bg" style="background-image: url('https://picsum.photos/seed/hometown/1200/900')"></div>
      <div class="auth-visual-overlay"></div>
      <div class="auth-visual-content" id="visualContent">
        <h2>找到属于你的<br>返家乡实践</h2>
        <p>AI 驱动的个性化推荐引擎，从数千个实践中精准匹配最适合你的那一个。填写你的专业、技能与偏好，让智能算法为你排序。</p>
      </div>
    </div>

    <!-- Right: Login Form -->
    <div class="auth-form-side" style="background-image: url('https://picsum.photos/seed/hometown/1200/900'); background-size: cover; background-position: center;">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg, rgba(79,140,255,0.04) 0%, rgba(12,12,20,0.97) 25%, var(--color-bg) 60%);"></div>
      <div class="auth-card" id="authCard" style="position:relative;z-index:2;">
        <div class="auth-header">
          <span class="logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-primary)">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
          </span>
          <h1>欢迎回来</h1>
          <p>登录后使用 AI 推荐功能</p>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        {% if rate_limited %}
        <div class="rate-limit-message">登录失败次数过多，请 5 分钟后再试</div>
        {% endif %}

        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="输入你的用户名" required autofocus>
          </div>

          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="输入密码" required>
          </div>

          <button type="submit" class="auth-btn">登 录</button>
        </form>

        <div class="auth-footer">
          还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

      tl.from('#visualContent h2', {
        y: 40, opacity: 0, duration: 0.9, delay: 0.2
      })
      .from('#visualContent p', {
        y: 30, opacity: 0, duration: 0.7
      }, '-=0.5')
      .from('#authCard', {
        x: 40, opacity: 0, duration: 0.8
      }, '-=0.6')
      .from('#authCard .form-group', {
        y: 20, opacity: 0, duration: 0.5, stagger: 0.1
      }, '-=0.4')
      .from('#authCard .auth-btn', {
        y: 16, opacity: 0, duration: 0.5
      }, '-=0.2')
      .from('#authCard .auth-footer', {
        opacity: 0, duration: 0.4
      }, '-=0.2');
    });
  </script>

</body>
</html>
